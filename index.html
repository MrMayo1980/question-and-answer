<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Never Lose Your Land</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  // Добавлен deleteDoc для удаления постов
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, arrayUnion, query, orderBy, onSnapshot, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ─────────────────────────────────────────
  // 🔧 CONFIGURATION — Fill in your own keys
  // ─────────────────────────────────────────
 const firebaseConfig = {
  apiKey:            "AIzaSyBXQvv8_J41Z_ycJrEbkj0p0sBr7str8p0",
  authDomain:        "askit-69ff2.firebaseapp.com",
  projectId:         "askit-69ff2",
  storageBucket:     "askit-69ff2.firebasestorage.app",
  messagingSenderId: "787131578609",
  appId:             "1:787131578609:web:9e897f0dcc9bf2983e1150"
};

  const CLOUDINARY_CLOUD_NAME = "dqwwyhbvn";
  const CLOUDINARY_UPLOAD_PRESET = "askit_uploads"; 
  // ─────────────────────────────────────────

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // ── Cloudinary upload helper
  async function uploadToCloudinary(file) {
    const fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
    fd.append("resource_type", "auto");
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`, { method: "POST", body: fd });
    if (!res.ok) throw new Error("Ошибка загрузки файла");
    return await res.json(); 
  }

  // ── Auth state
  window.currentUser = null;
  onAuthStateChanged(auth, user => {
    window.currentUser = user;
    if (user) {
      document.getElementById("auth-section").style.display = "none";
      document.getElementById("app-section").style.display  = "block";
      document.getElementById("user-name-display").textContent = user.displayName || user.email;
      loadPosts();
    } else {
      document.getElementById("auth-section").style.display = "flex";
      document.getElementById("app-section").style.display  = "none";
    }
  });

  // ── Register
  window.doRegister = async () => {
    const name  = document.getElementById("reg-name").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const pass  = document.getElementById("reg-pass").value;
    if (!name || !email || !pass) return showAuthError("Пожалуйста, заполните все поля.");
    try {
      showAuthError("");
      setAuthLoading(true);
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
    } catch(e) { showAuthError(e.message); }
    finally { setAuthLoading(false); }
  };

  // ── Login
  window.doLogin = async () => {
    const email = document.getElementById("login-email").value.trim();
    const pass  = document.getElementById("login-pass").value;
    if (!email || !pass) return showAuthError("Пожалуйста, заполните все поля.");
    try {
      showAuthError("");
      setAuthLoading(true);
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) { showAuthError(e.message); }
    finally { setAuthLoading(false); }
  };

  // ── Logout
  window.doLogout = () => signOut(auth);

  // ── Posts
  window.submitPost = async () => {
    if (!window.currentUser) return;
    const title  = document.getElementById("post-title").value.trim();
    const body   = document.getElementById("post-body").value.trim();
    const mainFile = document.getElementById("post-main-image").files[0];
    const extraFiles = Array.from(document.getElementById("post-extra-media").files).slice(0, 4);
    if (!title) return showPostError("Заголовок вопроса обязателен.");

    showPostError("");
    setPostLoading(true);
    try {
      let mainUrl = null;
      if (mainFile) {
        const r = await uploadToCloudinary(mainFile);
        mainUrl = { url: r.secure_url, type: r.resource_type };
      }
      const extras = [];
      for (const f of extraFiles) {
        const r = await uploadToCloudinary(f);
        extras.push({ url: r.secure_url, type: r.resource_type });
      }
      await addDoc(collection(db, "posts"), {
        title, body,
        mainMedia: mainUrl,
        extraMedia: extras,
        authorId:   window.currentUser.uid,
        authorName: window.currentUser.displayName || window.currentUser.email,
        createdAt:  serverTimestamp(),
        comments:   []
      });
      document.getElementById("post-title").value = "";
      document.getElementById("post-body").value  = "";
      document.getElementById("post-main-image").value  = "";
      document.getElementById("post-extra-media").value = "";
      clearPreviews();
      document.getElementById("new-post-form").classList.remove("open");
    } catch(e) { showPostError(e.message); }
    finally { setPostLoading(false); }
  };

  // ── Delete Post
  window.deletePost = async (postId, event) => {
    if (event) event.stopPropagation();
    if (!confirm("Вы уверены, что хотите удалить этот пост?")) return;
    try {
      await deleteDoc(doc(db, "posts", postId));
      if (window.activePost && window.activePost.id === postId) closeModal();
    } catch (e) { alert(e.message); }
  };

  // ── Load Posts
  let unsubPosts = null;
  function loadPosts() {
    if (unsubPosts) unsubPosts();
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    unsubPosts = onSnapshot(q, snap => {
      const posts = [];
      snap.forEach(d => posts.push({ id: d.id, ...d.data() }));
      renderPosts(posts);
    });
  }

  function renderPosts(posts) {
    const grid = document.getElementById("posts-grid");
    grid.innerHTML = "";
    if (posts.length === 0) {
      grid.innerHTML = `<div class="empty-state"><p>Пока нет записей. Станьте первым.</p></div>`;
      return;
    }
    posts.forEach(post => {
      const card = document.createElement("div");
      card.className = "post-card";
      card.onclick = () => openModal(post);

      const img = post.mainMedia
        ? (post.mainMedia.type === "video"
            ? `<video class="card-thumb" src="${post.mainMedia.url}" muted playsinline></video>`
            : `<img class="card-thumb" src="${post.mainMedia.url}" alt="" loading="lazy">`)
        : `<div class="card-thumb card-thumb-empty"></div>`;

      const isAuthor = window.currentUser && window.currentUser.uid === post.authorId;
      const deleteBtnHTML = isAuthor ? `<button class="del-btn" onclick="deletePost('${post.id}', event)">✕</button>` : '';

      card.innerHTML = `
        ${img}
        <div class="card-body">
          <div class="card-meta">
            <span class="card-author">${esc(post.authorName)}</span>
            <div class="card-actions">
              <span class="card-comments">Ответов: ${(post.comments||[]).length}</span>
              ${deleteBtnHTML}
            </div>
          </div>
          <h3 class="card-title">${esc(post.title)}</h3>
          ${post.body ? `<p class="card-excerpt">${esc(post.body).slice(0,120)}${post.body.length>120?"…":""}</p>` : ""}
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // ── Modal
  window.activePost = null;
  window.openModal = async (post) => {
    window.activePost = post;
    document.getElementById("modal-title").textContent   = post.title;
    document.getElementById("modal-author").textContent  = post.authorName;
    document.getElementById("modal-body").textContent    = post.body || "";

    const mainEl = document.getElementById("modal-main-media");
    mainEl.innerHTML = "";
    if (post.mainMedia) {
      mainEl.appendChild(makeMedia(post.mainMedia, "modal-main-img"));
    }

    const extraEl = document.getElementById("modal-extra-media");
    extraEl.innerHTML = "";
    (post.extraMedia || []).forEach(m => extraEl.appendChild(makeMedia(m, "modal-extra-item")));

    renderComments(post.comments || []);
    document.getElementById("modal-overlay").classList.add("active");
    document.body.style.overflow = "hidden";

    if (unsubModal) unsubModal();
    unsubModal = onSnapshot(doc(db, "posts", post.id), snap => {
      const data = snap.data();
      if (data) {
        window.activePost = { id: snap.id, ...data };
        renderComments(data.comments || []);
      }
    });
  };

  let unsubModal = null;

  window.closeModal = () => {
    document.getElementById("modal-overlay").classList.remove("active");
    document.body.style.overflow = "";
    if (unsubModal) { unsubModal(); unsubModal = null; }
  };

  function makeMedia(m, cls) {
    if (m.type === "video") {
      const v = document.createElement("video");
      v.src = m.url; v.controls = true; v.className = cls;
      return v;
    }
    const img = document.createElement("img");
    img.src = m.url; img.className = cls; img.loading = "lazy";
    return img;
  }

  // ── Comments
  window.submitComment = async () => {
    if (!window.currentUser || !window.activePost) return;
    const text = document.getElementById("comment-text").value.trim();
    const file = document.getElementById("comment-image").files[0];
    if (!text && !file) return;

    setCommentLoading(true);
    try {
      let mediaUrl = null;
      if (file) {
        const r = await uploadToCloudinary(file);
        mediaUrl = { url: r.secure_url, type: r.resource_type };
      }
      const comment = {
        id: Date.now().toString() + Math.random().toString(36).substr(2, 9), // Уникальный ID для удаления
        text, media: mediaUrl,
        authorId:   window.currentUser.uid,
        authorName: window.currentUser.displayName || window.currentUser.email,
        createdAt:  Date.now()
      };
      await updateDoc(doc(db, "posts", window.activePost.id), { comments: arrayUnion(comment) });
      document.getElementById("comment-text").value  = "";
      document.getElementById("comment-image").value = "";
      document.getElementById("comment-preview").innerHTML = "";
    } catch(e) { alert(e.message); }
    finally { setCommentLoading(false); }
  };

  // ── Delete Comment
  window.deleteComment = async (commentId) => {
    if (!window.activePost) return;
    if (!confirm("Удалить этот ответ?")) return;
    try {
      const updatedComments = window.activePost.comments.filter(c => c.id !== commentId);
      await updateDoc(doc(db, "posts", window.activePost.id), { comments: updatedComments });
    } catch (e) { alert(e.message); }
  };

  function renderComments(comments) {
    const el = document.getElementById("comments-list");
    el.innerHTML = "";
    if (!comments.length) {
      el.innerHTML = `<p class="no-comments">Здесь пока тихо...</p>`;
      return;
    }
    [...comments].sort((a,b) => a.createdAt - b.createdAt).forEach(c => {
      const div = document.createElement("div");
      div.className = "comment";
      
      const isCommentAuthor = window.currentUser && window.currentUser.uid === c.authorId;
      const deleteHtml = isCommentAuthor ? `<button class="del-comment-btn" onclick="deleteComment('${c.id}')">Удалить</button>` : '';

      div.innerHTML = `
        <div class="comment-header">
          <span class="comment-author">${esc(c.authorName)}</span>
          <div style="display:flex; gap: 10px; align-items:center;">
            <span class="comment-time">${c.createdAt ? new Date(c.createdAt).toLocaleDateString() : ""}</span>
            ${deleteHtml}
          </div>
        </div>
        ${c.text ? `<p class="comment-text">${esc(c.text)}</p>` : ""}
      `;
      if (c.media) div.appendChild(makeMedia(c.media, "comment-img"));
      el.appendChild(div);
    });
  }

  // ── Preview helpers
  window.previewMainImage = (input) => {
    const el = document.getElementById("main-image-preview");
    el.innerHTML = "";
    if (input.files[0]) el.innerHTML = `<img src="${URL.createObjectURL(input.files[0])}" style="max-height:120px;margin-top:8px;">`;
  };
  window.previewExtraMedia = (input) => {
    const el = document.getElementById("extra-media-preview");
    el.innerHTML = "";
    Array.from(input.files).slice(0,4).forEach(f => {
      if (f.type.startsWith("video/")) { const v=document.createElement("video"); v.src=URL.createObjectURL(f); v.style.cssText="max-height:80px;margin:4px"; el.appendChild(v); }
      else { const i=document.createElement("img"); i.src=URL.createObjectURL(f); i.style.cssText="max-height:80px;margin:4px"; el.appendChild(i); }
    });
  };
  window.previewCommentImage = (input) => {
    const el = document.getElementById("comment-preview");
    el.innerHTML = "";
    if (input.files[0]) el.innerHTML = `<img src="${URL.createObjectURL(input.files[0])}" style="max-height:80px;margin-top:6px;">`;
  };
  function clearPreviews() {
    ["main-image-preview","extra-media-preview"].forEach(id => document.getElementById(id).innerHTML = "");
  }

  // ── UI helpers
  function showAuthError(msg) { document.getElementById("auth-error").textContent = msg; }
  function showPostError(msg) { document.getElementById("post-error").textContent = msg; }
  function setAuthLoading(v)    { document.getElementById("auth-submit-btn").disabled = v; document.getElementById("auth-submit-btn").textContent = v ? "Ожидайте…" : document.getElementById("auth-tab-login").classList.contains("active") ? "Войти" : "Создать аккаунт"; }
  function setPostLoading(v)    { const b=document.getElementById("post-submit-btn"); b.disabled=v; b.textContent=v?"Публикация…":"Опубликовать"; }
  function setCommentLoading(v) { const b=document.getElementById("comment-submit-btn"); b.disabled=v; b.textContent=v?"Отправка…":"Ответить"; }
  function esc(s) { const d=document.createElement("div"); d.textContent=s||""; return d.innerHTML; }

  // ── Auth tab switching
  window.switchTab = (tab) => {
    document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
    document.getElementById(`auth-tab-${tab}`).classList.add("active");
    document.getElementById("auth-panel-login").style.display    = tab==="login"    ? "flex" : "none";
    document.getElementById("auth-panel-register").style.display = tab==="register" ? "flex" : "none";
    document.getElementById("auth-submit-btn").textContent = tab==="login" ? "Войти" : "Создать аккаунт";
    document.getElementById("auth-submit-btn").onclick = tab==="login" ? doLogin : doRegister;
    showAuthError("");
  };
  window.switchTab("login");

  // ── Toggle new post form
  window.togglePostForm = () => document.getElementById("new-post-form").classList.toggle("open");

  // ── Close modal on backdrop
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
</script>

<style>
:root {
  --bg:     #060608;
  --bg2:    #0a0b0d;
  --bg3:    #121316;
  --border: rgba(220, 205, 175, 0.15);
  --accent: #dccdbe; /* Песочный/золотой */
  --accent-hover: #ffffff;
  --text:   #c8c3b9;
  --muted:  #7a7770;
  --radius: 0px; /* Брутализм - острые углы */
  --shadow: 0 10px 40px rgba(0,0,0,0.8);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { 
  font-family: 'DM Sans', sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  min-height: 100vh; 
  position: relative;
}

/* Фоновый водяной знак в стиле референса */
.bg-watermark {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
  opacity: 0.03;
  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
  font-family: 'DM Sans', sans-serif;
  font-weight: 800;
  font-size: 8vw;
  line-height: 1;
  color: #fff;
  text-transform: uppercase;
  transform: rotate(-10deg) scale(1.5);
}

/* Поднятие контента над фоном */
#auth-section, #app-section { position: relative; z-index: 10; }

/* ── AUTH ─────────────────────────────── */
#auth-section {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:24px;
}
.auth-box {
  width:100%; max-width:400px;
  background: var(--bg2); 
  border: 1px solid var(--border);
  padding: 40px 36px; 
  box-shadow: var(--shadow);
}
.auth-logo { 
  font-family: 'Playfair Display', serif; 
  font-size: 32px; 
  color: var(--accent); 
  margin-bottom: 6px; 
  display: flex;
  align-items: center;
  gap: 12px;
}
.auth-logo img { width: 24px; height: 24px; filter: invert(90%) sepia(15%) saturate(300%) hue-rotate(350deg); }
.auth-tagline { color: var(--muted); font-size: 13px; margin-bottom: 32px; font-style: italic; }
.auth-tabs { display:flex; gap:0; margin-bottom:24px; border:1px solid var(--border); }
.auth-tab { flex:1; padding:12px; text-align:center; cursor:pointer; font-size:13px; text-transform: uppercase; letter-spacing: 1px; font-weight:500; color:var(--muted); background:transparent; border:none; transition:.2s; }
.auth-tab.active { background:var(--bg3); color:var(--accent); }
.auth-panel { display:flex; flex-direction:column; gap:16px; }
.auth-panel input { background:transparent; border:1px solid var(--border); padding:14px 16px; color:var(--text); font-family:inherit; font-size:14px; outline:none; transition:.2s; }
.auth-panel input:focus { border-color:var(--accent); }
#auth-error { color:#a34444; font-size:13px; min-height:16px; margin-top:-4px; }
.auth-btn { background:transparent; color:var(--accent); border:1px solid var(--accent); padding:14px; cursor:pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; transition:.2s; margin-top:8px; }
.auth-btn:hover { background:var(--accent); color:#000; }
.auth-btn:disabled { opacity:.5; cursor:not-allowed; }

/* ── APP ──────────────────────────────── */
#app-section { display:none; min-height:100vh; }
.topbar {
  position:sticky; top:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding: 16px 40px; background: rgba(6,6,8,0.95);
  border-bottom: 1px solid var(--border);
}
.topbar-logo { 
  font-family: 'Playfair Display', serif; 
  font-size: 24px; 
  color: var(--accent); 
  display: flex;
  align-items: center;
  gap: 12px;
}
.topbar-logo img { width: 20px; height: 20px; filter: invert(90%) sepia(15%) saturate(300%) hue-rotate(350deg); }
.topbar-right { display:flex; align-items:center; gap:24px; }
.user-badge { font-size:13px; color:var(--muted); }
.topbar-btn { background:transparent; border:none; color:var(--muted); font-family:inherit; font-size:13px; text-transform: uppercase; letter-spacing: 1px; cursor:pointer; transition:.2s; }
.topbar-btn:hover { color:var(--accent); }
.ask-btn { background:transparent; color:var(--accent); border: 1px solid var(--accent); padding:8px 16px; cursor:pointer; font-size:12px; text-transform: uppercase; letter-spacing: 1px; transition:.2s; }
.ask-btn:hover { background:var(--accent); color:#000; }

/* ── HERO SECTION (Из референса) ──────── */
.hero-section {
  padding: 80px 40px;
  max-width: 1200px;
  margin: 0 auto;
}
.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: 5rem;
  line-height: 1.1;
  color: var(--accent);
  font-weight: 400;
}
.hero-title i { color: var(--muted); font-weight: 400; }

/* ── NEW POST FORM ────────────────────── */
.new-post-wrapper { background:var(--bg2); border-bottom:1px solid var(--border); overflow:hidden; max-height:0; transition:max-height .4s cubic-bezier(.4,0,.2,1); }
#new-post-form.open .new-post-wrapper { max-height:800px; }
#new-post-form .new-post-inner { padding:40px; max-width:800px; margin:0 auto; }
#new-post-form h3 { font-family: 'Playfair Display', serif; font-size:24px; margin-bottom:24px; color:var(--accent); font-weight: 400; }
.form-row { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
.form-row label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.form-row input[type=text], .form-row textarea {
  background:transparent; border:1px solid var(--border);
  padding:14px; color:var(--text); font-family:inherit; font-size:14px; outline:none; resize:vertical; transition:.2s;
}
.form-row input:focus, .form-row textarea:focus { border-color:var(--accent); }
.file-label { display:inline-flex; align-items:center; gap:8px; background:transparent; border:1px dashed var(--border); padding:12px 16px; font-size:12px; text-transform: uppercase; letter-spacing: 1px; color:var(--muted); cursor:pointer; transition:.2s; }
.file-label:hover { border-color:var(--accent); color:var(--accent); }
.file-label input { display:none; }
#post-error { color:#a34444; font-size:13px; min-height:16px; }
.post-actions { display:flex; gap:16px; align-items:center; margin-top:10px; }
.submit-btn { background:var(--accent); color:#000; border:none; padding:12px 32px; cursor:pointer; font-size:12px; text-transform: uppercase; letter-spacing: 1px; transition:.2s; font-weight: 500;}
.submit-btn:hover { background:var(--accent-hover); }
.submit-btn:disabled { opacity:.5; cursor:not-allowed; }
.cancel-link { color:var(--muted); font-size:12px; text-transform: uppercase; letter-spacing: 1px; cursor:pointer; }
.cancel-link:hover { color:var(--text); }

/* ── GRID ─────────────────────────────── */
.feed-section { max-width:1200px; margin:0 auto; padding:0 40px 80px; }
.feed-header { margin-bottom: 32px; display: flex; flex-wrap: wrap; gap: 10px; }
/* Декоративные теги-фильтры как на скриншоте */
.filter-tag { border: 1px solid var(--border); padding: 8px 16px; font-size: 11px; text-transform: uppercase; color: var(--muted); cursor: default; }
.filter-tag.active { border-color: var(--accent); color: var(--accent); }

.posts-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:24px; }
.post-card { background:transparent; border:1px solid var(--border); overflow:hidden; cursor:pointer; transition:.3s; position: relative; }
.post-card:hover { border-color:var(--accent); background: var(--bg2); }
.card-thumb { width:100%; height:240px; object-fit:cover; display:block; filter: grayscale(40%) contrast(1.1); transition: .3s; }
.post-card:hover .card-thumb { filter: grayscale(0%) contrast(1); }
.card-thumb-empty { width:100%; height:120px; display:flex; align-items:center; justify-content:center; background:var(--bg2); border-bottom: 1px solid var(--border); }
.card-body { padding:24px; }
.card-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
.card-author { font-size:11px; color:var(--accent); text-transform: uppercase; letter-spacing: 1px; }
.card-actions { display:flex; gap:12px; align-items:center; }
.card-comments { font-size:11px; color:var(--muted); text-transform: uppercase;}
.card-title { font-family: 'Playfair Display', serif; font-size:20px; font-weight:400; line-height:1.3; margin-bottom:12px; color: var(--accent); }
.card-excerpt { font-size:14px; color:var(--muted); line-height:1.6; }

/* Кнопки удаления */
.del-btn { background: transparent; border: none; color: #a34444; cursor: pointer; font-size: 14px; padding: 4px; transition: .2s; }
.del-btn:hover { color: #ff5555; transform: scale(1.1); }
.del-comment-btn { background: transparent; border: none; color: #a34444; font-size: 11px; text-transform: uppercase; cursor: pointer; }
.del-comment-btn:hover { color: #ff5555; text-decoration: underline; }

.empty-state { grid-column:1/-1; padding:80px 20px; color:var(--muted); font-family: 'Playfair Display', serif; font-size: 24px; font-style: italic; border: 1px solid var(--border); text-align: center; }

/* ── MODAL ────────────────────────────── */
#modal-overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.9); backdrop-filter:blur(4px);
  overflow-y:auto; padding:40px 20px;
}
#modal-overlay.active { display:flex; align-items:flex-start; justify-content:center; }
.modal-box {
  background:var(--bg); border:1px solid var(--border);
  width:100%; max-width:800px;
  box-shadow:var(--shadow); margin:auto;
  animation:modalIn .4s ease-out;
}
@keyframes modalIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
.modal-header { padding:40px 40px 20px; display:flex; justify-content:space-between; align-items:flex-start; border-bottom: 1px solid var(--border); margin-bottom: 24px;}
.modal-title-block h2 { font-family: 'Playfair Display', serif; font-size:32px; font-weight:400; line-height:1.2; margin-bottom:12px; color: var(--accent); }
.modal-author { font-size:12px; color:var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.modal-close { background:transparent; border:none; color:var(--muted); font-size:24px; cursor:pointer; transition:.2s; }
.modal-close:hover { color:var(--accent); }
#modal-body { padding:0 40px 32px; font-size:16px; color:var(--text); line-height:1.7; }
#modal-main-media { padding:0 40px 24px; }
.modal-main-img { width:100%; max-height:500px; object-fit:cover; display:block; border: 1px solid var(--border); filter: grayscale(20%); }
#modal-extra-media { display:flex; gap:16px; padding:0 40px 32px; overflow-x:auto; }
.modal-extra-item { height:120px; width:auto; object-fit:cover; border: 1px solid var(--border); flex-shrink:0; }
.modal-divider { border:none; border-top:1px solid var(--border); margin:0; }

/* ── COMMENTS ─────────────────────────── */
.comments-section { padding:32px 40px 40px; background: var(--bg2); }
.comments-section h4 { font-family: 'Playfair Display', serif; font-size:20px; font-weight: 400; color: var(--accent); margin-bottom:24px; }
#comments-list { display:flex; flex-direction:column; gap:20px; margin-bottom:32px; }
.no-comments { font-size:14px; color:var(--muted); font-style: italic; }
.comment { padding-bottom: 16px; border-bottom: 1px dashed rgba(220, 205, 175, 0.1); }
.comment:last-child { border-bottom: none; }
.comment-header { display:flex; justify-content:space-between; margin-bottom:10px; }
.comment-author { font-size:11px; text-transform: uppercase; letter-spacing: 1px; color:var(--accent); }
.comment-time { font-size:11px; color:var(--muted); }
.comment-text { font-size:14px; line-height:1.6; color: #b0ada5; }
.comment-img { max-width:200px; max-height:150px; margin-top:12px; object-fit:cover; border: 1px solid var(--border); }

.comment-form { display:flex; flex-direction:column; gap:16px; margin-top: 24px; }
.comment-form textarea { background:transparent; border:1px solid var(--border); padding:14px; color:var(--text); font-family:inherit; font-size:14px; resize:none; outline:none; transition:.2s; }
.comment-form textarea:focus { border-color:var(--accent); }
.comment-form-row { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
#comment-submit-btn { background:transparent; color:var(--accent); border:1px solid var(--accent); padding:10px 24px; cursor:pointer; font-size:11px; text-transform: uppercase; letter-spacing: 1px; transition:.2s; }
#comment-submit-btn:hover { background:var(--accent); color:#000; }
#comment-submit-btn:disabled { opacity:.5; cursor:not-allowed; }

/* ── Scrollbar ────────────────────────── */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); }

/* ── Mobile ───────────────────────────── */
@media(max-width:768px){
  .hero-title { font-size: 3rem; }
  .topbar { padding:16px 20px; }
  .feed-section { padding: 0 20px 40px; }
  .modal-header, #modal-body, #modal-main-media, #modal-extra-media, .comments-section { padding-left:20px; padding-right:20px; }
  .posts-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div class="bg-watermark">
  NEVER LOSE YOUR LAND NEVER LOSE YOUR LAND NEVER LOSE YOUR LAND NEVER LOSE YOUR LAND NEVER LOSE YOUR LAND NEVER LOSE YOUR LAND
</div>

<section id="auth-section">
  <div class="auth-box">
    <div class="auth-logo">Never Lose Your Land`></div>
    <div class="auth-tagline">Затерянные в свете дальних берегов...</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="auth-tab-login"    onclick="switchTab('login')">Вход</button>
      <button class="auth-tab"        id="auth-tab-register" onclick="switchTab('register')">Регистрация</button>
    </div>

    <div id="auth-panel-login" class="auth-panel">
      <input id="login-email" type="email"    placeholder="Электронная почта" autocomplete="email">
      <input id="login-pass"  type="password" placeholder="Пароль"      autocomplete="current-password">
    </div>
    <div id="auth-panel-register" class="auth-panel" style="display:none">
      <input id="reg-name"  type="text"     placeholder="Имя пользователя">
      <input id="reg-email" type="email"    placeholder="Электронная почта" autocomplete="email">
      <input id="reg-pass"  type="password" placeholder="Пароль (мин. 6 символов)" autocomplete="new-password">
    </div>

    <div id="auth-error"></div>
    <button id="auth-submit-btn" class="auth-btn" onclick="doLogin()">Войти</button>
  </div>
</section>

<div id="app-section">
  <nav class="topbar">
    <div class="topbar-logo">Never Lose Your Land</div>
    <div class="topbar-right">
      <span class="user-badge" id="user-name-display"></span>
      <button class="ask-btn" onclick="togglePostForm()">Написать</button>
      <button class="topbar-btn" onclick="doLogout()">Выход</button>
    </div>
  </nav>

  <div class="hero-section">
    <h1 class="hero-title">Добро пожаловать<br>в Never Lose Your Land!</h1>
  </div>

  <div id="new-post-form">
    <div class="new-post-wrapper">
      <div class="new-post-inner">
        <h3>Новая запись</h3>
        <div class="form-row">
          <label>Заголовок *</label>
          <input id="post-title" type="text" placeholder="О чем хотите рассказать?">
        </div>
        <div class="form-row">
          <label>Текст (необязательно)</label>
          <textarea id="post-body" rows="4" placeholder="Добавьте детали..."></textarea>
        </div>
        <div class="form-row">
          <label>Главное фото</label>
          <label class="file-label">Выбрать главное медиа
            <input id="post-main-image" type="file" accept="image/*,video/*" onchange="previewMainImage(this)">
          </label>
          <div id="main-image-preview"></div>
        </div>
        <div class="form-row">
          <label>Дополнительные материалы (до 4)</label>
          <label class="file-label">Выбрать дополнительные файлы
            <input id="post-extra-media" type="file" accept="image/*,video/*" multiple onchange="previewExtraMedia(this)">
          </label>
          <div id="extra-media-preview" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;"></div>
        </div>
        <div id="post-error"></div>
        <div class="post-actions">
          <button id="post-submit-btn" class="submit-btn" onclick="submitPost()">Опубликовать</button>
          <span class="cancel-link" onclick="togglePostForm()">Отмена</span>
        </div>
      </div>
    </div>
  </div>

  <div class="feed-section">
    <div class="posts-grid" id="posts-grid">
      <div class="empty-state">Загрузка...</div>
    </div>
  </div>
</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title-block">
        <h2 id="modal-title"></h2>
        <div class="modal-author" id="modal-author"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <p id="modal-body"></p>
    <div id="modal-main-media"></div>
    <div id="modal-extra-media"></div>
    <div class="comments-section">
      <h4>Ответы</h4>
      <div id="comments-list"></div>
      <div class="comment-form">
        <textarea id="comment-text" rows="3" placeholder="Оставьте свой след..."></textarea>
        <div class="comment-form-row">
          <label class="file-label" style="font-size:11px;padding:8px 16px;">Прикрепить фото
            <input id="comment-image" type="file" accept="image/*" onchange="previewCommentImage(this)">
          </label>
          <button id="comment-submit-btn" onclick="submitComment()">Ответить</button>
        </div>
        <div id="comment-preview"></div>
      </div>
    </div>
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AskIt — Questions & Answers</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, arrayUnion, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ─────────────────────────────────────────
  // 🔧 CONFIGURATION — Fill in your own keys
  // ─────────────────────────────────────────
 const firebaseConfig = {
  apiKey:            "AIzaSyBXQvv8_J41Z_ycJrEbkj0p0sBr7str8p0",
  authDomain:        "askit-69ff2.firebaseapp.com",
  projectId:         "askit-69ff2",
  storageBucket:     "askit-69ff2.firebasestorage.app",
  messagingSenderId: "787131578609",
  appId:             "1:787131578609:web:9e897f0dcc9bf2983e1150"
};

  const CLOUDINARY_CLOUD_NAME = "dqwwyhbvn";
  const CLOUDINARY_UPLOAD_PRESET = "askit_uploads"; // unsigned preset
  // ─────────────────────────────────────────

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // ── Cloudinary upload helper ──────────────────────────────────────────────
  async function uploadToCloudinary(file) {
    const fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
    fd.append("resource_type", "auto");
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`, { method: "POST", body: fd });
    if (!res.ok) throw new Error("Cloudinary upload failed");
    return await res.json(); // .secure_url, .resource_type
  }

  // ── Auth state ────────────────────────────────────────────────────────────
  let currentUser = null;
  onAuthStateChanged(auth, user => {
    currentUser = user;
    if (user) {
      document.getElementById("auth-section").style.display = "none";
      document.getElementById("app-section").style.display  = "block";
      document.getElementById("user-name-display").textContent = user.displayName || user.email;
      loadPosts();
    } else {
      document.getElementById("auth-section").style.display = "flex";
      document.getElementById("app-section").style.display  = "none";
    }
  });

  // ── Register ──────────────────────────────────────────────────────────────
  window.doRegister = async () => {
    const name  = document.getElementById("reg-name").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const pass  = document.getElementById("reg-pass").value;
    if (!name || !email || !pass) return showAuthError("Please fill in all fields.");
    try {
      showAuthError("");
      setAuthLoading(true);
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
    } catch(e) { showAuthError(e.message); }
    finally { setAuthLoading(false); }
  };

  // ── Login ─────────────────────────────────────────────────────────────────
  window.doLogin = async () => {
    const email = document.getElementById("login-email").value.trim();
    const pass  = document.getElementById("login-pass").value;
    if (!email || !pass) return showAuthError("Please fill in all fields.");
    try {
      showAuthError("");
      setAuthLoading(true);
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) { showAuthError(e.message); }
    finally { setAuthLoading(false); }
  };

  // ── Logout ────────────────────────────────────────────────────────────────
  window.doLogout = () => signOut(auth);

  // ── Posts ─────────────────────────────────────────────────────────────────
  window.submitPost = async () => {
    if (!currentUser) return;
    const title  = document.getElementById("post-title").value.trim();
    const body   = document.getElementById("post-body").value.trim();
    const mainFile = document.getElementById("post-main-image").files[0];
    const extraFiles = Array.from(document.getElementById("post-extra-media").files).slice(0, 4);
    if (!title) return showPostError("Question title is required.");

    showPostError("");
    setPostLoading(true);
    try {
      let mainUrl = null;
      if (mainFile) {
        const r = await uploadToCloudinary(mainFile);
        mainUrl = { url: r.secure_url, type: r.resource_type };
      }
      const extras = [];
      for (const f of extraFiles) {
        const r = await uploadToCloudinary(f);
        extras.push({ url: r.secure_url, type: r.resource_type });
      }
      await addDoc(collection(db, "posts"), {
        title, body,
        mainMedia: mainUrl,
        extraMedia: extras,
        authorId:   currentUser.uid,
        authorName: currentUser.displayName || currentUser.email,
        createdAt:  serverTimestamp(),
        comments:   []
      });
      document.getElementById("post-title").value = "";
      document.getElementById("post-body").value  = "";
      document.getElementById("post-main-image").value  = "";
      document.getElementById("post-extra-media").value = "";
      clearPreviews();
      document.getElementById("new-post-form").classList.remove("open");
    } catch(e) { showPostError(e.message); }
    finally { setPostLoading(false); }
  };

  // ── Load Posts (realtime) ─────────────────────────────────────────────────
  let unsubPosts = null;
  function loadPosts() {
    if (unsubPosts) unsubPosts();
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    unsubPosts = onSnapshot(q, snap => {
      const posts = [];
      snap.forEach(d => posts.push({ id: d.id, ...d.data() }));
      renderPosts(posts);
    });
  }

  function renderPosts(posts) {
    const grid = document.getElementById("posts-grid");
    grid.innerHTML = "";
    if (posts.length === 0) {
      grid.innerHTML = `<div class="empty-state"><span>✦</span><p>No questions yet. Be the first!</p></div>`;
      return;
    }
    posts.forEach(post => {
      const card = document.createElement("div");
      card.className = "post-card";
      card.onclick = () => openModal(post);

      const img = post.mainMedia
        ? (post.mainMedia.type === "video"
            ? `<video class="card-thumb" src="${post.mainMedia.url}" muted playsinline></video>`
            : `<img class="card-thumb" src="${post.mainMedia.url}" alt="" loading="lazy">`)
        : `<div class="card-thumb card-thumb-empty"><span>?</span></div>`;

      card.innerHTML = `
        ${img}
        <div class="card-body">
          <div class="card-meta">
            <span class="card-author">${esc(post.authorName)}</span>
            <span class="card-comments">${(post.comments||[]).length} replies</span>
          </div>
          <h3 class="card-title">${esc(post.title)}</h3>
          ${post.body ? `<p class="card-excerpt">${esc(post.body).slice(0,120)}${post.body.length>120?"…":""}</p>` : ""}
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  let activePost = null;
  window.openModal = async (post) => {
    activePost = post;
    document.getElementById("modal-title").textContent   = post.title;
    document.getElementById("modal-author").textContent  = post.authorName;
    document.getElementById("modal-body").textContent    = post.body || "";

    // main media
    const mainEl = document.getElementById("modal-main-media");
    mainEl.innerHTML = "";
    if (post.mainMedia) {
      mainEl.appendChild(makeMedia(post.mainMedia, "modal-main-img"));
    }

    // extra media
    const extraEl = document.getElementById("modal-extra-media");
    extraEl.innerHTML = "";
    (post.extraMedia || []).forEach(m => extraEl.appendChild(makeMedia(m, "modal-extra-item")));

    renderComments(post.comments || []);
    document.getElementById("modal-overlay").classList.add("active");
    document.body.style.overflow = "hidden";

    // live comment updates
    if (unsubModal) unsubModal();
    const { onSnapshot: os, doc: docFn } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    unsubModal = onSnapshot(doc(db, "posts", post.id), snap => {
      const data = snap.data();
      if (data) {
        activePost = { id: snap.id, ...data };
        renderComments(data.comments || []);
      }
    });
  };

  let unsubModal = null;

  window.closeModal = () => {
    document.getElementById("modal-overlay").classList.remove("active");
    document.body.style.overflow = "";
    if (unsubModal) { unsubModal(); unsubModal = null; }
  };

  function makeMedia(m, cls) {
    if (m.type === "video") {
      const v = document.createElement("video");
      v.src = m.url; v.controls = true; v.className = cls;
      return v;
    }
    const img = document.createElement("img");
    img.src = m.url; img.className = cls; img.loading = "lazy";
    return img;
  }

  // ── Comments ──────────────────────────────────────────────────────────────
  window.submitComment = async () => {
    if (!currentUser || !activePost) return;
    const text = document.getElementById("comment-text").value.trim();
    const file = document.getElementById("comment-image").files[0];
    if (!text && !file) return;

    setCommentLoading(true);
    try {
      let mediaUrl = null;
      if (file) {
        const r = await uploadToCloudinary(file);
        mediaUrl = { url: r.secure_url, type: r.resource_type };
      }
      const comment = {
        text, media: mediaUrl,
        authorId:   currentUser.uid,
        authorName: currentUser.displayName || currentUser.email,
        createdAt:  Date.now()
      };
      await updateDoc(doc(db, "posts", activePost.id), { comments: arrayUnion(comment) });
      document.getElementById("comment-text").value  = "";
      document.getElementById("comment-image").value = "";
      document.getElementById("comment-preview").innerHTML = "";
    } catch(e) { alert(e.message); }
    finally { setCommentLoading(false); }
  };

  function renderComments(comments) {
    const el = document.getElementById("comments-list");
    el.innerHTML = "";
    if (!comments.length) {
      el.innerHTML = `<p class="no-comments">No replies yet — be the first!</p>`;
      return;
    }
    [...comments].sort((a,b) => a.createdAt - b.createdAt).forEach(c => {
      const div = document.createElement("div");
      div.className = "comment";
      div.innerHTML = `
        <div class="comment-header">
          <span class="comment-author">${esc(c.authorName)}</span>
          <span class="comment-time">${c.createdAt ? new Date(c.createdAt).toLocaleDateString() : ""}</span>
        </div>
        ${c.text ? `<p class="comment-text">${esc(c.text)}</p>` : ""}
      `;
      if (c.media) div.appendChild(makeMedia(c.media, "comment-img"));
      el.appendChild(div);
    });
  }

  // ── Preview helpers ───────────────────────────────────────────────────────
  window.previewMainImage = (input) => {
    const el = document.getElementById("main-image-preview");
    el.innerHTML = "";
    if (input.files[0]) el.innerHTML = `<img src="${URL.createObjectURL(input.files[0])}" style="max-height:120px;border-radius:8px;margin-top:8px;">`;
  };
  window.previewExtraMedia = (input) => {
    const el = document.getElementById("extra-media-preview");
    el.innerHTML = "";
    Array.from(input.files).slice(0,4).forEach(f => {
      if (f.type.startsWith("video/")) { const v=document.createElement("video"); v.src=URL.createObjectURL(f); v.style.cssText="max-height:80px;border-radius:6px;margin:4px"; el.appendChild(v); }
      else { const i=document.createElement("img"); i.src=URL.createObjectURL(f); i.style.cssText="max-height:80px;border-radius:6px;margin:4px"; el.appendChild(i); }
    });
  };
  window.previewCommentImage = (input) => {
    const el = document.getElementById("comment-preview");
    el.innerHTML = "";
    if (input.files[0]) el.innerHTML = `<img src="${URL.createObjectURL(input.files[0])}" style="max-height:80px;border-radius:6px;margin-top:6px;">`;
  };
  function clearPreviews() {
    ["main-image-preview","extra-media-preview"].forEach(id => document.getElementById(id).innerHTML = "");
  }

  // ── UI helpers ────────────────────────────────────────────────────────────
  function showAuthError(msg) { document.getElementById("auth-error").textContent = msg; }
  function showPostError(msg) { document.getElementById("post-error").textContent = msg; }
  function setAuthLoading(v)    { document.getElementById("auth-submit-btn").disabled = v; document.getElementById("auth-submit-btn").textContent = v ? "Please wait…" : document.getElementById("auth-tab-login").classList.contains("active") ? "Sign In" : "Create Account"; }
  function setPostLoading(v)    { const b=document.getElementById("post-submit-btn"); b.disabled=v; b.textContent=v?"Uploading…":"Post Question"; }
  function setCommentLoading(v) { const b=document.getElementById("comment-submit-btn"); b.disabled=v; b.textContent=v?"Posting…":"Post Reply"; }
  function esc(s) { const d=document.createElement("div"); d.textContent=s||""; return d.innerHTML; }

  // ── Auth tab switching ────────────────────────────────────────────────────
  window.switchTab = (tab) => {
    document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
    document.getElementById(`auth-tab-${tab}`).classList.add("active");
    document.getElementById("auth-panel-login").style.display    = tab==="login"    ? "flex" : "none";
    document.getElementById("auth-panel-register").style.display = tab==="register" ? "flex" : "none";
    document.getElementById("auth-submit-btn").textContent = tab==="login" ? "Sign In" : "Create Account";
    document.getElementById("auth-submit-btn").onclick = tab==="login" ? doLogin : doRegister;
    showAuthError("");
  };
  window.switchTab("login");

  // ── Toggle new post form ──────────────────────────────────────────────────
  window.togglePostForm = () => document.getElementById("new-post-form").classList.toggle("open");

  // ── Close modal on backdrop ───────────────────────────────────────────────
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
</script>

<style>
:root {
  --bg:     #0d0e11;
  --bg2:    #16181d;
  --bg3:    #1e2028;
  --border: rgba(255,255,255,0.07);
  --accent: #f0e14a;
  --accent2:#e0541e;
  --text:   #f0ede6;
  --muted:  #888;
  --radius: 14px;
  --shadow: 0 8px 40px rgba(0,0,0,0.5);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── AUTH ─────────────────────────────── */
#auth-section {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:24px;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a1c24 0%, var(--bg) 100%);
}
.auth-box {
  width:100%; max-width:420px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:20px; padding:40px 36px; box-shadow:var(--shadow);
}
.auth-logo { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:var(--accent); letter-spacing:-1px; margin-bottom:6px; }
.auth-tagline { color:var(--muted); font-size:14px; margin-bottom:28px; }
.auth-tabs { display:flex; gap:0; margin-bottom:24px; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.auth-tab { flex:1; padding:10px; text-align:center; cursor:pointer; font-size:14px; font-weight:500; color:var(--muted); background:transparent; border:none; transition:.2s; }
.auth-tab.active { background:var(--bg3); color:var(--text); }
.auth-panel { display:flex; flex-direction:column; gap:14px; }
.auth-panel input { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:13px 16px; color:var(--text); font-family:inherit; font-size:14px; outline:none; transition:.2s; }
.auth-panel input:focus { border-color:var(--accent); }
#auth-error { color:#f06060; font-size:13px; min-height:16px; margin-top:-4px; }
.auth-btn { background:var(--accent); color:#000; font-family:'Syne',sans-serif; font-weight:700; font-size:15px; border:none; border-radius:10px; padding:14px; cursor:pointer; transition:.2s; margin-top:4px; }
.auth-btn:hover { background:#ffe620; }
.auth-btn:disabled { opacity:.5; cursor:not-allowed; }

/* ── APP ──────────────────────────────── */
#app-section { display:none; min-height:100vh; }
.topbar {
  position:sticky; top:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 32px; background:rgba(13,14,17,0.85);
  backdrop-filter:blur(16px); border-bottom:1px solid var(--border);
}
.topbar-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; color:var(--accent); letter-spacing:-0.5px; }
.topbar-right { display:flex; align-items:center; gap:16px; }
.user-badge { font-size:13px; color:var(--muted); }
.topbar-btn { background:var(--bg3); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px 16px; font-family:inherit; font-size:13px; cursor:pointer; transition:.2s; }
.topbar-btn:hover { border-color:var(--accent); color:var(--accent); }
.ask-btn { background:var(--accent); color:#000; font-family:'Syne',sans-serif; font-weight:700; border:none; border-radius:8px; padding:9px 18px; cursor:pointer; font-size:14px; transition:.2s; }
.ask-btn:hover { background:#ffe620; transform:translateY(-1px); }

/* ── NEW POST FORM ────────────────────── */
.new-post-wrapper { background:var(--bg2); border-bottom:1px solid var(--border); overflow:hidden; max-height:0; transition:max-height .4s cubic-bezier(.4,0,.2,1); }
#new-post-form.open .new-post-wrapper { max-height:800px; }
#new-post-form .new-post-inner { padding:28px 32px; max-width:760px; margin:0 auto; }
#new-post-form h3 { font-family:'Syne',sans-serif; font-size:18px; margin-bottom:20px; color:var(--accent); }
.form-row { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
.form-row label { font-size:12px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
.form-row input[type=text], .form-row textarea {
  background:var(--bg3); border:1px solid var(--border); border-radius:10px;
  padding:12px 16px; color:var(--text); font-family:inherit; font-size:14px; outline:none; resize:vertical; transition:.2s;
}
.form-row input:focus, .form-row textarea:focus { border-color:var(--accent); }
.file-label { display:inline-flex; align-items:center; gap:8px; background:var(--bg3); border:1px dashed var(--border); border-radius:10px; padding:10px 16px; font-size:13px; color:var(--muted); cursor:pointer; transition:.2s; }
.file-label:hover { border-color:var(--accent); color:var(--accent); }
.file-label input { display:none; }
#post-error { color:#f06060; font-size:13px; min-height:16px; }
.post-actions { display:flex; gap:12px; align-items:center; margin-top:4px; }
.submit-btn { background:var(--accent2); color:#fff; font-family:'Syne',sans-serif; font-weight:700; border:none; border-radius:10px; padding:12px 28px; cursor:pointer; font-size:14px; transition:.2s; }
.submit-btn:hover { background:#f0651e; }
.submit-btn:disabled { opacity:.5; cursor:not-allowed; }
.cancel-link { color:var(--muted); font-size:14px; cursor:pointer; padding:4px; }
.cancel-link:hover { color:var(--text); }

/* ── GRID ─────────────────────────────── */
.feed-section { max-width:1200px; margin:0 auto; padding:40px 24px; }
.feed-header { margin-bottom:28px; }
.feed-header h2 { font-family:'Syne',sans-serif; font-size:24px; font-weight:700; }
.feed-header p  { color:var(--muted); font-size:14px; margin-top:4px; }
.posts-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }
.post-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:.25s; }
.post-card:hover { transform:translateY(-3px); border-color:rgba(240,225,74,.3); box-shadow:0 12px 40px rgba(0,0,0,.4); }
.card-thumb { width:100%; height:200px; object-fit:cover; display:block; background:var(--bg3); }
.card-thumb-empty { width:100%; height:200px; display:flex; align-items:center; justify-content:center; background:var(--bg3); font-size:48px; color:var(--border); }
.card-body { padding:18px; }
.card-meta { display:flex; justify-content:space-between; margin-bottom:8px; }
.card-author { font-size:12px; color:var(--accent); font-weight:500; }
.card-comments { font-size:12px; color:var(--muted); }
.card-title { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; line-height:1.3; margin-bottom:8px; }
.card-excerpt { font-size:13px; color:var(--muted); line-height:1.5; }
.empty-state { grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--muted); }
.empty-state span { font-size:40px; display:block; margin-bottom:12px; }

/* ── MODAL ────────────────────────────── */
#modal-overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.85); backdrop-filter:blur(8px);
  overflow-y:auto; padding:20px;
}
#modal-overlay.active { display:flex; align-items:flex-start; justify-content:center; }
.modal-box {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:20px; width:100%; max-width:820px;
  box-shadow:var(--shadow); overflow:hidden; margin:auto;
  animation:modalIn .3s cubic-bezier(.4,0,.2,1);
}
@keyframes modalIn { from{opacity:0;transform:scale(.96) translateY(10px)} to{opacity:1;transform:none} }
.modal-header { padding:24px 28px 0; display:flex; justify-content:space-between; align-items:flex-start; }
.modal-title-block h2 { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; line-height:1.3; margin-bottom:6px; }
.modal-author { font-size:13px; color:var(--accent); }
.modal-close { background:var(--bg3); border:1px solid var(--border); color:var(--text); width:36px; height:36px; border-radius:8px; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:.2s; }
.modal-close:hover { background:var(--border); }
#modal-body { padding:12px 28px 20px; font-size:15px; color:#c5c2bb; line-height:1.65; }
#modal-main-media { padding:0 28px 16px; }
.modal-main-img { width:100%; max-height:420px; object-fit:cover; border-radius:12px; display:block; }
#modal-extra-media { display:flex; gap:10px; padding:0 28px 20px; overflow-x:auto; }
.modal-extra-item { height:130px; width:auto; border-radius:10px; object-fit:cover; flex-shrink:0; }
.modal-divider { border:none; border-top:1px solid var(--border); margin:0 28px 20px; }

/* ── COMMENTS ─────────────────────────── */
.comments-section { padding:0 28px 28px; }
.comments-section h4 { font-family:'Syne',sans-serif; font-size:16px; margin-bottom:16px; }
#comments-list { display:flex; flex-direction:column; gap:12px; margin-bottom:20px; }
.no-comments { font-size:14px; color:var(--muted); }
.comment { background:var(--bg3); border-radius:10px; padding:14px; }
.comment-header { display:flex; justify-content:space-between; margin-bottom:6px; }
.comment-author { font-size:13px; font-weight:500; color:var(--accent); }
.comment-time { font-size:12px; color:var(--muted); }
.comment-text { font-size:14px; line-height:1.5; }
.comment-img { max-width:200px; max-height:150px; border-radius:8px; margin-top:8px; object-fit:cover; }
.comment-form { display:flex; flex-direction:column; gap:10px; background:var(--bg3); border-radius:12px; padding:16px; }
.comment-form textarea { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text); font-family:inherit; font-size:14px; resize:none; outline:none; transition:.2s; }
.comment-form textarea:focus { border-color:var(--accent); }
.comment-form-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
#comment-submit-btn { background:var(--accent); color:#000; font-family:'Syne',sans-serif; font-weight:700; border:none; border-radius:8px; padding:10px 20px; cursor:pointer; font-size:14px; transition:.2s; }
#comment-submit-btn:hover { background:#ffe620; }
#comment-submit-btn:disabled { opacity:.5; cursor:not-allowed; }

/* ── Scrollbar ────────────────────────── */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:4px; }

/* ── Mobile ───────────────────────────── */
@media(max-width:600px){
  .topbar { padding:12px 16px; }
  .feed-section { padding:24px 14px; }
  .modal-header, #modal-body, #modal-main-media, #modal-extra-media, .modal-divider, .comments-section { padding-left:16px; padding-right:16px; }
  .posts-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<!-- ── AUTH ──────────────────────────────────────── -->
<section id="auth-section">
  <div class="auth-box">
    <div class="auth-logo">AskIt ✦</div>
    <div class="auth-tagline">Ask questions. Share answers. Upload photos & videos.</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="auth-tab-login"    onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab"        id="auth-tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login -->
    <div id="auth-panel-login" class="auth-panel">
      <input id="login-email" type="email"    placeholder="Email address" autocomplete="email">
      <input id="login-pass"  type="password" placeholder="Password"      autocomplete="current-password">
    </div>
    <!-- Register -->
    <div id="auth-panel-register" class="auth-panel" style="display:none">
      <input id="reg-name"  type="text"     placeholder="Display name">
      <input id="reg-email" type="email"    placeholder="Email address" autocomplete="email">
      <input id="reg-pass"  type="password" placeholder="Password (min 6 chars)" autocomplete="new-password">
    </div>

    <div id="auth-error" style="margin-top:10px;"></div>
    <button id="auth-submit-btn" class="auth-btn" style="margin-top:16px;" onclick="doLogin()">Sign In</button>
  </div>
</section>

<!-- ── APP ───────────────────────────────────────── -->
<div id="app-section">
  <nav class="topbar">
    <div class="topbar-logo">AskIt ✦</div>
    <div class="topbar-right">
      <span class="user-badge">👤 <span id="user-name-display"></span></span>
      <button class="ask-btn" onclick="togglePostForm()">+ Ask Question</button>
      <button class="topbar-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </nav>

  <!-- New Post Form -->
  <div id="new-post-form">
    <div class="new-post-wrapper">
      <div class="new-post-inner">
        <h3>Ask a Question</h3>
        <div class="form-row">
          <label>Question *</label>
          <input id="post-title" type="text" placeholder="What do you want to ask?">
        </div>
        <div class="form-row">
          <label>Description (optional)</label>
          <textarea id="post-body" rows="3" placeholder="Add more context…"></textarea>
        </div>
        <div class="form-row">
          <label>Main Photo</label>
          <label class="file-label">📷 Choose main photo
            <input id="post-main-image" type="file" accept="image/*" onchange="previewMainImage(this)">
          </label>
          <div id="main-image-preview"></div>
        </div>
        <div class="form-row">
          <label>Extra Photos / Videos (up to 4)</label>
          <label class="file-label">🎞 Choose extra media
            <input id="post-extra-media" type="file" accept="image/*,video/*" multiple onchange="previewExtraMedia(this)">
          </label>
          <div id="extra-media-preview" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;"></div>
        </div>
        <div id="post-error" style="margin-bottom:8px;"></div>
        <div class="post-actions">
          <button id="post-submit-btn" class="submit-btn" onclick="submitPost()">Post Question</button>
          <span class="cancel-link" onclick="togglePostForm()">Cancel</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Feed -->
  <div class="feed-section">
    <div class="feed-header">
      <h2>Recent Questions</h2>
      <p>Click any card to read more and reply</p>
    </div>
    <div class="posts-grid" id="posts-grid">
      <div class="empty-state"><span>✦</span><p>Loading…</p></div>
    </div>
  </div>
</div>

<!-- ── MODAL ──────────────────────────────────────── -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title-block">
        <h2 id="modal-title"></h2>
        <div class="modal-author" id="modal-author"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <p id="modal-body"></p>
    <div id="modal-main-media"></div>
    <div id="modal-extra-media"></div>
    <hr class="modal-divider">
    <div class="comments-section">
      <h4>Replies</h4>
      <div id="comments-list"></div>
      <div class="comment-form">
        <textarea id="comment-text" rows="2" placeholder="Write a reply…"></textarea>
        <div class="comment-form-row">
          <label class="file-label" style="font-size:12px;padding:7px 12px;">📎 Photo
            <input id="comment-image" type="file" accept="image/*" onchange="previewCommentImage(this)">
          </label>
          <button id="comment-submit-btn" onclick="submitComment()">Post Reply</button>
        </div>
        <div id="comment-preview"></div>
      </div>
    </div>
  </div>
</div>

</body>
</html>l
